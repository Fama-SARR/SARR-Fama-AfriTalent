                    <button id="theme-toggle" class="btn btn-outline-light ms-3">
                       🌙
                    </button>


                </div>

            </div>

        </nav>

    </header>

    
    <main class="main-contact">
        <section class="container text-center py-5">
    <h1>Contactez-nous</h1>
    <p>Envoyez-nous un message</p>
</section>
    

    <section class="container pb-5">

        <div class="row g-5">

            <!-- FORMULAIRE -->

            <div class="col-lg-7">

                <form>

                    <!-- NOM -->

                    <div class="mb-3">

                        <label class="form-label">

                            Nom

                        </label>

                        <input type="text"

                               class="form-control"

                               placeholder="Votre nom">

                    </div>

                    <!-- PRENOM -->

                    <div class="mb-3">

                        <label class="form-label">

                            Prénom

                        </label>

                        <input type="text"

                               class="form-control"

                               placeholder="Votre prénom">

                    </div>

                    <!-- EMAIL -->

                    <div class="mb-3">

                        <label class="form-label">

                            Email

                        </label>

                        <input type="email"

                               class="form-control"

                               placeholder="Votre email">

                    </div>


                    <div class="mb-3">

                        <label class="form-label">

                            Sujet

                        </label>

                        <select class="form-select">

                            <option>Choisir un sujet</option>

                            <option>Support technique</option>

                            <option>Recrutement</option>

                            <option>Partenariat</option>

                            <option>Informations générales</option>

                        </select>

                    </div>

                    <!-- MESSAGE -->

                    <div class="mb-3">

                        <label class="form-label">

                            Message

                        </label>

                        <textarea class="form-control"

                                  rows="5"

                                  placeholder="Votre message"></textarea>

                    </div>

                    

                    <button type="submit"

                            class="btn btn-primary">

                        Envoyer le message

                    </button>

                </form>

            </div>

            <!-- INFORMATIONS -->

            <div class="col-lg-5">

                <h2 class="mb-4">

                    Nos coordonnées

                </h2>

                <p>

                    <i class="bi bi-envelope-fill"></i>

                    contact@afritalent.com

                </p>

                <p>

                    <i class="bi bi-telephone-fill"></i>

                    +221 77 283 90 77

                </p>

                <p>

                    <i class="bi bi-geo-alt-fill"></i>

                    Dakar, Sénégal

                </p>

                <img src="images/about-history.png"

                     class="img-fluid rounded mb-4"

                     alt="Équipe AfriTalent">
                     

            

                <!-- GOOGLE MAPS -->
<iframe
    src="https://www.google.com/maps?q=Dakar,Senegal&output=embed"
    width="100%"
    height="250"
    style="border:0;"
    allowfullscreen=""
    loading="lazy">
</iframe>
            </div>

        </div>

    </section>

    </main>
